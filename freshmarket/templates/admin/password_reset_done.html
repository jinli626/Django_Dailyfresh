{% extends 'admin/base.html' %}
{% load static %}
{% block title %}天天生鲜-邮件已发送{% endblock title %}

{% block admin_content %}
<div class="admin-card">
    <h2>📧 邮件已发送</h2>
    <p class="admin-subtitle">密码重置邮件已发送至您的邮箱</p>

    <div class="admin-notice">
        📌 请查收邮件并点击邮件中的链接重置密码。<br>
        如果未收到，请检查垃圾邮件箱。
    </div>

    <div class="form-links">
        <a href="{% url 'admin_panel:password_reset' %}">重新发送</a>
        <span style="color:#c0c4cc;margin:0 8px;">|</span>
        <a href="/admin/login/">返回管理登录</a>
    </div>
</div>
{% endblock admin_content %}
