{% extends 'admin/base.html' %}
{% load static %}
{% block title %}天天生鲜-管理员找回密码{% endblock title %}

{% block admin_content %}
<div class="admin-card">
    <h2>🔒 管理员找回密码</h2>
    <p class="admin-subtitle">输入注册邮箱，系统将发送密码重置链接</p>

    <form method="post">
        {% csrf_token %}
        <div class="form-row">
            <label>注册邮箱</label>
            <input type="email" name="email" placeholder="请输入管理员注册时使用的邮箱" required autofocus>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-primary">发送重置链接</button>
        </div>
    </form>

    <div class="form-links">
        <a href="/admin/login/">← 返回管理登录</a>
    </div>
</div>
{% endblock admin_content %}
