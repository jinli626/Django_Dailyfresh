{% extends 'base/base.html' %}
{% load static %}
{% block title %}天天生鲜-找回密码{% endblock title %}
{% block header_con %}{% endblock header_con %}
{% block search_bar %}{% endblock search_bar %}
{% block body %}
<div class="login_top clearfix">
    <a href="{% url 'goods:index' %}" class="login_logo"><img src="{% static 'images/logo02.png' %}"></a>
</div>

<div class="login_form_bg">
    <div class="login_form_wrap clearfix">
        <div class="login_banner fl"></div>
        <div class="slogan fl">日夜兼程 · 急速送达</div>
        <div class="login_form fr">
            <div class="login_title clearfix">
                <h1>找回密码</h1>
                <a href="{% url 'user:login' %}">立即登录</a>
            </div>
            <div class="form_input">
                <p style="margin-bottom:15px;color:#666;">请输入您的注册邮箱，我们将发送密码重置链接到您的邮箱。</p>
                <form method="post">
                    {% csrf_token %}
                    <input type="email" name="email" class="name_input" placeholder="请输入注册邮箱" required autofocus>
                    <input type="submit" value="发送重置链接" class="input_submit">
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock body %}
